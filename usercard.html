<!doctype html>
<html lang="en">
  <head>

    <title>Document</title>
    <link rel="stylesheet" href="/usercard.css" />

      <form action="">
        <h3>Yangi post</h3>

        <label for="sarlavha">Sarlavha</label>
        <br />

          class="style-in"
          type="text"
          id="sarlavha"

        <br />

        <br />

          class="style-in"
          name=""

          placeholder="Post matni"

        <br />

        <label class="muallif" for="muallif">Muallif</label>
        <br />

          class="style-in"
          type="text"
          id="muallif"
          placeholder="Ismingiz"
        />

        <br />
        <div class="buttons">
          <button class="btn1">Bekor qilish</button>
          <button class="btn2">Saqlash</button>

      </form>
    </div>

    <script src="/usercard.js"></script>
